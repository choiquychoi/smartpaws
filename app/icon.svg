<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Define a single paw print, centered around (0,0) -->
    <g id="paw">
      <!-- Central Pad -->
      <path d="M0 0 C-8 0, -16 5, -14 17 C-12 29, -5 34, 0 34 C5 34, 12 29, 14 17 C16 5, 8 0, 0 0 Z" />
      <!-- Four Toes -->
      <circle cx="-16" cy="-7" r="7" />
      <circle cx="-6" cy="-18" r="7.5" />
      <circle cx="7" cy="-18" r="7.5" />
      <circle cx="17" cy="-7" r="7" />
    </g>
  </defs>

  <!-- Left/Bottom Paw (slanted left) -->
  <g transform="translate(32, 62) rotate(-15) scale(0.85)" fill="#24163b">
    <use href="#paw" />
  </g>

  <!-- Right/Top Paw (slanted right) -->
  <g transform="translate(68, 36) rotate(15) scale(0.85)" fill="#24163b">
    <use href="#paw" />
  </g>
</svg>
